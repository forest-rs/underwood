name: Governance Audit

on:
  schedule:
    - cron: "47 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remote-controls:
    name: remote repository controls
    runs-on: ubuntu-latest
    steps:
      - name: check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: audit live GitHub controls
        run: bash .github/audit-remote.sh
        env:
          GH_TOKEN: ${{ secrets.UNDERWOOD_GOVERNANCE_TOKEN }}
